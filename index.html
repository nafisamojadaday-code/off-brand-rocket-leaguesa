<!DOCTYPE html>
<html>
<head>
  <title>Mini Rocket Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Field
let field = new THREE.Mesh(
  new THREE.PlaneGeometry(50,30),
  new THREE.MeshBasicMaterial({color: 0x228B22})
);
field.rotation.x = -Math.PI/2;
scene.add(field);

// Ball
let ball = new THREE.Mesh(
  new THREE.SphereGeometry(1),
  new THREE.MeshBasicMaterial({color: 0xffffff})
);
ball.position.set(0,1,0);
scene.add(ball);

let ballVel = {x:0, z:0};

// Car
let car = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,4),
  new THREE.MeshBasicMaterial({color: 0xff0000})
);
car.position.set(0,0.5,10);
scene.add(car);

let velocity = 0;
let direction = 0;

// Controls
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Goals
let score = 0;

// Game loop
function animate(){
  requestAnimationFrame(animate);

  // Movement
  if(keys["w"]) velocity += 0.01;
  if(keys["s"]) velocity -= 0.01;
  velocity *= 0.95;

  if(keys["a"]) direction += 0.05;
  if(keys["d"]) direction -= 0.05;

  car.rotation.y = direction;

  car.position.x -= Math.sin(direction) * velocity;
  car.position.z -= Math.cos(direction) * velocity;

  // Ball physics (simple)
  let dx = ball.position.x - car.position.x;
  let dz = ball.position.z - car.position.z;
  let dist = Math.sqrt(dx*dx + dz*dz);

  if(dist < 2){
    ballVel.x += dx * 0.1;
    ballVel.z += dz * 0.1;
  }

  ball.position.x += ballVel.x;
  ball.position.z += ballVel.z;

  ballVel.x *= 0.95;
  ballVel.z *= 0.95;

  // Goal detection
  if(ball.position.z < -14){
    score++;
    ball.position.set(0,1,0);
    ballVel = {x:0,z:0};
    console.log("Score:", score);
  }

  // Camera follow
  camera.position.x = car.position.x + Math.sin(direction) * 10;
  camera.position.z = car.position.z + Math.cos(direction) * 10;
  camera.position.y = 6;
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
